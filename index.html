
<!DOCTYPE html>

    <title>LAWIFY - AI Legal Assistant</title>
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
      body { font-family: 'Inter', sans-serif; }
      h1, h2, h3, h4, h5, h6, .font-serif { font-family: 'Playfair Display', serif; }
      .scrollbar-hide::-webkit-scrollbar { display: none; }
      .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
      .glass-panel { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); }
      @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
      @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
      @keyframes messageIn { from { opacity: 0; transform: translateY(10px) scale(0.98); } to { opacity: 1; transform: translateY(0); } }
      .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
      .animate-fade-in-up { animation: slideUp 0.5s ease-out forwards; }
      .animate-message-in { animation: messageIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
      .delay-100 { animation-delay: 100ms; }
      .delay-200 { animation-delay: 200ms; }
      .delay-300 { animation-delay: 300ms; }
      /* A4 Paper Simulation */
      .a4-paper {
        width: 210mm;
        min-height: 297mm;
        padding: 20mm;
        margin: 0 auto;
        background: white;
        box-shadow: 0 0 15px rgba(0,0,0,0.1);
      }
      @media (max-width: 768px) {
        .a4-paper { width: 100%; padding: 15px; min-height: 500px; }
      }
    </style>
